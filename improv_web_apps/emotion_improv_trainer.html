<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Эмоция — тренажёр импровизации</title>
<style>
:root{--bg:#111318;--accent:#fff;--text:#f6f7fb;--muted:rgba(246,247,251,.62)}*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}body{transition:background .3s}
.app{min-height:100dvh;display:grid;grid-template-rows:auto 1fr auto;padding:20px clamp(16px,4vw,40px);gap:16px}header{display:flex;justify-content:space-between;align-items:center}.brand{font-weight:800}button{cursor:pointer}
.icon{width:44px;height:44px;border:0;border-radius:14px;background:rgba(255,255,255,.08);color:white;font-size:19px}.stage{display:grid;place-items:center;text-align:center}.category{color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700;min-height:28px}h1{margin:16px 0 0;font-size:clamp(54px,10vw,138px);line-height:.94;letter-spacing:-.05em}.counter{margin-top:28px;color:var(--muted)}footer{width:min(100%,760px);justify-self:center}.next{width:100%;min-height:78px;border:0;border-radius:24px;background:var(--accent);font-size:28px;font-weight:850;color:#111318}.hint{text-align:center;color:var(--muted);font-size:13px;margin-top:10px}
.panel{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;place-items:end center;padding:20px}.panel.open{display:grid}.sheet{width:min(560px,100%);background:#22252d;border-radius:24px;padding:22px}label{display:flex;justify-content:space-between;padding:14px 0}.done{width:100%;min-height:52px;border:0;border-radius:16px;font-weight:800}
</style></head><body>
<main class="app"><header><div class="brand">● Эмоция</div><div><button class="icon" id="full">⛶</button> <button class="icon" id="settings">⚙︎</button></div></header>
<section class="stage"><div><div class="category" id="category"></div><h1 id="emotion">Загрузка…</h1><div class="counter" id="counter"></div></div></section>
<footer><button class="next" id="next">Следующая</button><div class="hint">Пробел, Enter или стрелка вправо</div></footer></main>
<div class="panel" id="panel"><div class="sheet"><h2>Настройки</h2><label><span>Показывать группу</span><input type="checkbox" id="showCategory" checked></label><label><span>Звуки</span><input type="checkbox" id="sound" checked></label><button class="done" id="done">Готово</button></div></div>
<script>
const GROUPS={"Положительная": ["Радость", "Восторг", "Счастье", "Ликование", "Воодушевление", "Вдохновение", "Удовольствие", "Умиротворение", "Нежность", "Любовь", "Благодарность", "Надежда", "Облегчение", "Гордость", "Уверенность", "Доверие", "Симпатия", "Забота", "Теплота", "Предвкушение"], "Негативная": ["Грусть", "Тоска", "Печаль", "Разочарование", "Обида", "Вина", "Стыд", "Отвращение", "Одиночество", "Беспомощность", "Усталость", "Апатия", "Безысходность"], "Напряжённая": ["Тревога", "Страх", "Паника", "Смущение", "Нервозность", "Подозрение", "Настороженность", "Растерянность", "Сомнение", "Нетерпение"], "Конфликтная": ["Злость", "Ярость", "Раздражение", "Возмущение", "Ревность", "Зависть", "Презрение", "Упрямство", "Мстительность", "Недоверие"], "Спокойная": ["Спокойствие", "Расслабленность", "Сосредоточенность", "Безмятежность", "Равнодушие", "Задумчивость", "Сдержанность"], "Социальная": ["Заинтересованность", "Вежливость", "Неловкость", "Сочувствие", "Восхищение", "Почтение", "Заискивание", "Снисходительность"], "Неожиданная": ["Удивление", "Шок", "Озадаченность", "Изумление", "Недоумение", "Ошеломление"], "Смешанная": ["Смех сквозь слёзы", "Тревожная радость", "Горькое облегчение", "Смущённая гордость", "Ностальгия", "Злорадство", "Ревнивая нежность"]}; const colors=['#3b3020','#3a2026','#202a3b','#3b2020','#20352f','#2d2740','#30303a','#3a2f20'];
let order=[],index=-1; const cat=document.getElementById('category'),emo=document.getElementById('emotion'),cnt=document.getElementById('counter');
function rebuild(){order=[];Object.entries(GROUPS).forEach(([g,es])=>es.forEach(e=>order.push({g,e})));order.sort(()=>Math.random()-.5)}
function beep(){if(!document.getElementById('sound').checked)return;try{const c=new AudioContext(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=440+Math.random()*220;g.gain.setValueAtTime(.05,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.12);o.start();o.stop(c.currentTime+.12)}catch(e){}}
function next(play=true){index++;if(index>=order.length){rebuild();index=0}const x=order[index];cat.textContent=x.g;emo.textContent=x.e;cnt.textContent=`${index+1} из ${order.length}`;document.body.style.background=colors[Object.keys(GROUPS).indexOf(x.g)%colors.length];if(play)beep()}
document.getElementById('next').onclick=()=>next(true);document.getElementById('settings').onclick=()=>panel.classList.add('open');document.getElementById('done').onclick=()=>panel.classList.remove('open');
document.getElementById('showCategory').onchange=e=>cat.style.opacity=e.target.checked?1:0;document.getElementById('full').onclick=()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen?.();
document.addEventListener('keydown',e=>{if(['Space','Enter','ArrowRight'].includes(e.code)||e.key==='Enter'){e.preventDefault();next(true)}});rebuild();next(false);
</script></body></html>
