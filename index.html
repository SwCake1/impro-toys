<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Небольшие инструменты для импровизации: выбирайте и начинайте играть."
    />
    <title>Инструменты для импровизации</title>
    <link rel="stylesheet" href="./shared/styles.css" />
  </head>
  <body class="catalog-page">
    <main class="catalog-shell">
      <header class="catalog-header">
        <p class="catalog-kicker">Всё для сцены</p>
        <h1 class="catalog-title">Инструменты для импровизации</h1>
        <p class="catalog-intro">
          Маленькие помощники для репетиций, игр и неожиданных поворотов на сцене.
        </p>
      </header>

      <ul class="tool-grid" aria-label="Доступные инструменты">
        <li>
          <a class="tool-card" href="./tools/bell/index.html">
            <span class="tool-card__content">
              <img
                class="tool-card__icon"
                src="./shared/assets/bell.svg"
                alt=""
                width="120"
                height="120"
              />
              <span class="tool-card__name">Звонок</span>
            </span>
          </a>
        </li>
        <li>
          <a
            class="tool-card"
            href="./tools/word/index.html"
            style="--card-accent: #b47716; --card-accent-soft: rgba(212, 155, 71, 0.22)"
          >
            <span class="tool-card__content">
              <img
                class="tool-card__icon"
                src="./shared/assets/word.svg"
                alt=""
                width="120"
                height="120"
              />
              <span class="tool-card__name">Генератор слов</span>
            </span>
          </a>
        </li>
        <li>
          <a
            class="tool-card"
            href="./tools/emotion/index.html"
            style="--card-accent: #574483; --card-accent-soft: rgba(87, 68, 131, 0.18)"
          >
            <span class="tool-card__content">
              <img
                class="tool-card__icon"
                src="./shared/assets/emotion.svg"
                alt=""
                width="120"
                height="120"
              />
              <span class="tool-card__name">Генератор эмоций</span>
            </span>
          </a>
        </li>
      </ul>
    </main>
  </body>
</html>
