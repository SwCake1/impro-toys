<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дзынь</title>
<link rel="stylesheet" href="../../shared/styles.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --bg: #1a1208;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', Georgia, serif;
    overflow: hidden;
    cursor: none;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 10;
    opacity: 0.4;
  }

  .glow-bg {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    transition: opacity 0.5s;
  }

  .scene {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
  }

  .title {
    color: var(--gold);
    font-size: clamp(1rem, 3vw, 1.2rem);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    opacity: 0.5;
    font-weight: 400;
  }

  .bell-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ripple-ring {
    position: absolute;
    width: 140px; height: 140px;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    opacity: 0;
    pointer-events: none;
  }

  .btn {
    width: 140px; height: 140px;
    border-radius: 50%;
    border: none;
    background: radial-gradient(circle at 35% 35%, #e8c85a, #b8902a 60%, #7a5510);
    cursor: none;
    position: relative;
    box-shadow:
      0 0 0 2px rgba(201,168,76,0.3),
      0 8px 40px rgba(0,0,0,0.7),
      inset 0 2px 4px rgba(255,255,255,0.2),
      inset 0 -4px 8px rgba(0,0,0,0.4);
    transition: transform 0.08s, box-shadow 0.08s;
    outline: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn:active {
    transform: scale(0.94) translateY(3px);
    box-shadow:
      0 0 0 2px rgba(201,168,76,0.2),
      0 3px 20px rgba(0,0,0,0.8),
      inset 0 2px 4px rgba(255,255,255,0.15),
      inset 0 -2px 4px rgba(0,0,0,0.5);
  }

  .bell-svg {
    width: 64px; height: 64px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }

  .btn.ringing .bell-svg {
    animation: bellShake 0.5s ease-out;
  }

  @keyframes bellShake {
    0%   { transform: rotate(0deg); }
    15%  { transform: rotate(-18deg); }
    35%  { transform: rotate(16deg); }
    55%  { transform: rotate(-12deg); }
    75%  { transform: rotate(8deg); }
    90%  { transform: rotate(-4deg); }
    100% { transform: rotate(0deg); }
  }

  @keyframes rippleOut {
    0%   { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(3); opacity: 0; }
  }

  .label {
    color: var(--gold-light);
    font-size: clamp(2.5rem, 8vw, 4rem);
    letter-spacing: 0.1em;
    opacity: 0;
    pointer-events: none;
    text-shadow: 0 0 30px rgba(201,168,76,0.6);
    font-style: italic;
    min-height: 1.2em;
    text-align: center;
  }

  .label.show {
    animation: fadeLabel 1.5s ease-out forwards;
  }

  @keyframes fadeLabel {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    30%  { opacity: 1; transform: translateY(-8px) scale(1.04); }
    100% { opacity: 0; transform: translateY(-24px) scale(0.95); }
  }

  /* ── Settings button ── */
  .settings-btn {
    position: fixed;
    bottom: 28px; right: 28px;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.3);
    background: rgba(26,18,8,0.85);
    cursor: none;
    display: flex; align-items: center; justify-content: center;
    color: rgba(201,168,76,0.45);
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    z-index: 100;
    backdrop-filter: blur(8px);
    outline: none;
  }
  .settings-btn:hover {
    border-color: rgba(201,168,76,0.65);
    color: var(--gold);
    background: rgba(201,168,76,0.07);
  }
  .settings-btn svg { width: 15px; height: 15px; }
  .settings-btn.spinning svg { animation: spinGear 0.45s ease-out forwards; }
  @keyframes spinGear { to { transform: rotate(90deg); } }

  /* ── Settings panel ── */
  .settings-panel {
    --settings-top-clearance: max(4.75rem, calc(env(safe-area-inset-top) + 3.75rem));
    position: fixed;
    bottom: 74px; right: 28px;
    display: flex;
    width: min(320px, calc(100vw - 32px));
    max-height: min(680px, calc(100vh - 74px - var(--settings-top-clearance)));
    max-height: min(680px, calc(100dvh - 74px - var(--settings-top-clearance)));
    flex-direction: column;
    background: rgba(14, 9, 2, 0.97);
    border: 1px solid rgba(201,168,76,0.18);
    border-radius: 14px;
    padding: 18px 16px;
    z-index: 200;
    backdrop-filter: blur(20px);
    box-shadow: 0 24px 64px rgba(0,0,0,0.85), 0 0 0 1px rgba(201,168,76,0.04);
    transform-origin: bottom right;
    transform: scale(0.82) translateY(10px);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.24s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.18s ease;
  }
  .settings-panel.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  .settings-panel h3 {
    color: rgba(201,168,76,0.4);
    font-size: 0.6rem;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    margin-bottom: 12px;
    font-weight: 400;
    padding-left: 2px;
  }

  .volume-toggle,
  .screen-ring-toggle {
    display: flex;
    width: 100%;
    min-height: 46px;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    padding: 8px 12px;
    border: 1px solid rgba(201,168,76,0.24);
    border-radius: 10px;
    background: rgba(201,168,76,0.08);
    color: rgba(240,208,128,0.72);
    cursor: none;
    transition: background 0.13s, border-color 0.13s, color 0.13s;
  }
  .volume-toggle:hover,
  .volume-toggle:focus-visible,
  .screen-ring-toggle:hover,
  .screen-ring-toggle:focus-visible {
    border-color: rgba(201,168,76,0.52);
    outline: none;
    background: rgba(201,168,76,0.14);
    color: var(--gold-light);
  }
  .volume-toggle:focus-visible,
  .screen-ring-toggle:focus-visible {
    box-shadow: 0 0 0 2px rgba(201,168,76,0.28);
  }
  .volume-toggle span,
  .screen-ring-toggle span {
    font-size: 0.78rem;
  }
  .volume-toggle strong,
  .screen-ring-toggle strong {
    min-width: 58px;
    border-radius: 999px;
    padding: 6px 9px;
    background: var(--gold);
    color: #1a1004;
    font-size: 0.82rem;
    letter-spacing: 0.04em;
    text-align: center;
  }
  .screen-ring-toggle strong {
    background: rgba(201,168,76,0.14);
    color: rgba(240,208,128,0.58);
  }
  .screen-ring-toggle[aria-pressed="true"] strong {
    background: var(--gold);
    color: #1a1004;
  }

  .sound-list {
    display: flex;
    min-height: 0;
    flex-direction: column;
    gap: 2px;
    overflow-y: auto;
    overscroll-behavior: contain;
    scrollbar-color: rgba(201,168,76,0.35) transparent;
  }

  .sound-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px 8px;
    border-radius: 8px;
    cursor: none;
    border: 1px solid transparent;
    transition: background 0.13s, border-color 0.13s;
  }
  .sound-item:hover { background: rgba(201,168,76,0.06); }
  .sound-item.active {
    background: rgba(201,168,76,0.09);
    border-color: rgba(201,168,76,0.22);
  }

  .sound-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    border: 1.5px solid rgba(201,168,76,0.35);
    flex-shrink: 0;
    transition: background 0.13s, border-color 0.13s, box-shadow 0.13s;
  }
  .sound-item.active .sound-dot {
    background: var(--gold);
    border-color: var(--gold);
    box-shadow: 0 0 7px rgba(201,168,76,0.55);
  }

  .sound-info { flex: 1; min-width: 0; }
  .sound-name {
    color: rgba(240,208,128,0.7);
    font-size: 0.8rem;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sound-item.active .sound-name { color: var(--gold-light); }
  .sound-tag {
    font-size: 0.6rem;
    color: rgba(201,168,76,0.3);
    letter-spacing: 0.08em;
    font-style: italic;
  }

  .preview-btn {
    width: 44px;
    height: 44px;
    background: none;
    border: none;
    cursor: none;
    color: rgba(201,168,76,0.25);
    padding: 0;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    border-radius: 50%;
    transition: color 0.13s, background 0.13s;
  }
  .preview-btn:hover {
    color: var(--gold);
    background: rgba(201,168,76,0.08);
  }
  .preview-btn svg { width: 18px; height: 18px; margin-left: 2px; }

  /* ── Screaming Cat ── */
  .cat-container {
    position: fixed;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    pointer-events: none;
    z-index: 50;
  }
  .cat-container.scream {
    animation: catPop 2.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  @keyframes catPop {
    0%   { transform: translateX(-50%) translateY(100%); }
    18%  { transform: translateX(-50%) translateY(-14px) rotate(-2deg); }
    30%  { transform: translateX(-50%) translateY(2px) rotate(1deg); }
    45%  { transform: translateX(-50%) translateY(-5px) rotate(0deg); }
    58%  { transform: translateX(-50%) translateY(0px); }
    75%  { transform: translateX(-50%) translateY(0px); opacity: 1; }
    100% { transform: translateX(-50%) translateY(130%); opacity: 0; }
  }

  .cat-svg {
    width: 140px;
    height: 150px;
    display: block;
  }

  /* fur spikes — transform-box so origin is local */
  .fur-spike {
    transform-box: fill-box;
    transform-origin: bottom center;
  }
  .cat-container.scream .fur-spike {
    animation: furShake 0.13s ease-in-out infinite alternate;
  }
  @keyframes furShake {
    from { transform: rotate(-6deg) scaleY(1); }
    to   { transform: rotate(6deg) scaleY(1.15); }
  }

  /* eye pupils */
  .eye-pupil {
    transform-box: fill-box;
    transform-origin: center;
  }
  .cat-container.scream .eye-pupil {
    animation: pupilSpin 0.35s linear infinite;
  }
  @keyframes pupilSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* mouth shake — drawn at absolute coords, no SVG transform */
  .cat-mouth-group {
    transform-box: fill-box;
    transform-origin: center;
  }
  .cat-container.scream .cat-mouth-group {
    animation: mouthVibe 0.09s ease-in-out infinite alternate;
  }
  @keyframes mouthVibe {
    from { transform: scaleX(1) scaleY(1); }
    to   { transform: scaleX(1.07) scaleY(0.93); }
  }

  /* scream text */
  .cat-scream-text {
    position: absolute;
    top: -34px; left: 50%;
    transform: translateX(-50%);
    font-size: 1rem;
    font-style: italic;
    color: #ff9944;
    white-space: nowrap;
    text-shadow: 0 0 12px rgba(255,100,0,0.8);
    letter-spacing: 0.05em;
    opacity: 0;
  }
  .cat-container.scream .cat-scream-text {
    animation: textPop 2.2s ease-out forwards;
  }
  @keyframes textPop {
    0%   { opacity: 0; transform: translateX(-50%) scale(0.7) translateY(8px); }
    20%  { opacity: 1; transform: translateX(-50%) scale(1.08) translateY(0); }
    55%  { opacity: 1; transform: translateX(-50%) scale(1); }
    80%  { opacity: 0; }
    100% { opacity: 0; }
  }

  /* ── Egor surprise ── */
  .egor-container {
    --egor-tilt: -2deg;
    --egor-tilt-reverse: 2deg;
    --egor-flip: 1;
    position: fixed;
    bottom: -5vh;
    left: 50%;
    width: min(255px, 66vw);
    height: min(345px, 60vh);
    transform: translateX(-50%) translateY(115%) rotate(var(--egor-tilt));
    transform-origin: center bottom;
    pointer-events: none;
    z-index: 51;
    opacity: 0;
  }
  .egor-container.pop {
    animation: egorPop 2.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .egor-image {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
    object-position: center bottom;
    transform: scaleX(var(--egor-flip));
    filter: drop-shadow(0 18px 28px rgba(0, 0, 0, 0.55));
  }
  @keyframes egorPop {
    0% {
      opacity: 0;
      transform: translateX(-50%) translateY(115%) rotate(var(--egor-tilt)) scale(0.82);
    }
    18% {
      opacity: 1;
      transform: translateX(-50%) translateY(-2%) rotate(var(--egor-tilt-reverse)) scale(1.04);
    }
    30% {
      transform: translateX(-50%) translateY(2%) rotate(var(--egor-tilt)) scale(0.99);
    }
    62% {
      opacity: 1;
      transform: translateX(-50%) translateY(0) rotate(0) scale(1);
    }
    78% {
      opacity: 1;
      transform: translateX(-50%) translateY(0) rotate(0) scale(1);
    }
    100% {
      opacity: 0;
      transform: translateX(-50%) translateY(125%) rotate(var(--egor-tilt-reverse)) scale(0.94);
    }
  }

  /* ── Cursor ── */
  .cursor {
    position: fixed;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--gold);
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.14s, height 0.14s, background 0.14s;
    mix-blend-mode: screen;
  }
  .cursor.big {
    width: 46px; height: 46px;
    background: rgba(201,168,76,0.12);
    border: 1px solid var(--gold);
  }

  .tool-navigation {
    --tool-nav-foreground: var(--gold-light);
    --tool-nav-background: rgba(26, 18, 8, 0.82);
    --tool-nav-border: rgba(201, 168, 76, 0.32);
    --tool-nav-focus: var(--gold);
    cursor: none;
  }

  @media (pointer: coarse) {
    body,
    .btn,
    .settings-btn,
    .sound-item,
    .preview-btn,
    .volume-toggle,
    .screen-ring-toggle,
    .tool-navigation {
      cursor: auto;
    }

    .cursor {
      display: none;
    }
  }
</style>
</head>
<body>

<a class="tool-navigation" id="catalogLink" href="../../index.html">Все инструменты</a>
<div class="glow-bg" id="glowBg"></div>
<div class="cursor" id="cursor"></div>

<div class="scene">
  <div class="title">Колокольчик</div>
  <div class="bell-wrap">
    <div class="ripple-ring" id="ring1"></div>
    <div class="ripple-ring" id="ring2"></div>
    <div class="ripple-ring" id="ring3"></div>
    <button class="btn" id="bellBtn" aria-label="Дзынь">
      <svg class="bell-svg" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M32 8 C20 8 14 18 14 30 L14 42 Q14 44 12 44 L10 44 L10 48 L54 48 L54 44 L52 44 Q50 44 50 42 L50 30 C50 18 44 8 32 8 Z"
          fill="url(#bg)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
        <ellipse cx="32" cy="52" rx="5" ry="3.5" fill="#6a4010" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
        <path d="M22 18 Q24 14 30 13" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
        <defs>
          <linearGradient id="bg" x1="14" y1="8" x2="54" y2="52" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#f5d060"/>
            <stop offset="50%" stop-color="#c9a84c"/>
            <stop offset="100%" stop-color="#7a5510"/>
          </linearGradient>
        </defs>
      </svg>
    </button>
  </div>
  <div class="label" id="label">Дзынь!</div>
</div>

<!-- Screaming Cat -->
<div class="cat-container" id="catContainer">
  <div class="cat-scream-text" id="catText">А-А-А-А-А!!!</div>
  <svg class="cat-svg" viewBox="0 0 140 150" fill="none" xmlns="http://www.w3.org/2000/svg">

    <!-- TAIL (behind body, right side) -->
    <path d="M88 140 Q118 132 120 110 Q122 90 106 84"
          stroke="#c4722a" stroke-width="9" stroke-linecap="round" fill="none"/>
    <path d="M88 140 Q118 132 120 110 Q122 90 106 84"
          stroke="#e8953f" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.55"/>

    <!-- BODY -->
    <ellipse cx="68" cy="118" rx="36" ry="28" fill="#e8953f"/>
    <!-- belly -->
    <ellipse cx="68" cy="120" rx="22" ry="19" fill="#f7c97a" opacity="0.85"/>

    <!-- HEAD -->
    <ellipse cx="68" cy="68" rx="34" ry="32" fill="#e8953f"/>
    <!-- face pale patch -->
    <ellipse cx="68" cy="72" rx="22" ry="20" fill="#f7c97a" opacity="0.55"/>

    <!-- EAR LEFT (drawn before spikes so spikes overlap) -->
    <polygon points="34,54 26,24 52,46" fill="#e8953f"/>
    <polygon points="37,52 31,30 48,45" fill="#f7a0a0" opacity="0.75"/>

    <!-- EAR RIGHT -->
    <polygon points="102,54 114,24 88,46" fill="#e8953f"/>
    <polygon points="99,52 109,30 92,45" fill="#f7a0a0" opacity="0.75"/>

    <!-- FOREHEAD FUR SPIKES (startled) -->
    <polygon class="fur-spike" points="50,44 46,22 56,42" fill="#c4722a"/>
    <polygon class="fur-spike" points="64,40 62,18 70,39" fill="#c4722a"/>
    <polygon class="fur-spike" points="78,43 82,21 86,44" fill="#c4722a"/>

    <!-- FOREHEAD STRIPES -->
    <path d="M54,54 Q57,46 60,54" stroke="#c4722a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M65,51 Q68,43 71,51" stroke="#c4722a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M76,54 Q79,46 82,54" stroke="#c4722a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- EYE LEFT — all at absolute coords, pupil uses transform-box -->
    <circle cx="50" cy="66" r="12" fill="white"/>
    <circle cx="50" cy="66" r="9"  fill="#28a028"/>
    <ellipse class="eye-pupil" cx="50" cy="66" rx="5" ry="8" fill="#111"/>
    <circle cx="54" cy="61" r="2.5" fill="white" opacity="0.9"/>
    <path d="M38,62 Q50,53 62,62" stroke="#c4722a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- EYE RIGHT -->
    <circle cx="86" cy="66" r="12" fill="white"/>
    <circle cx="86" cy="66" r="9"  fill="#28a028"/>
    <ellipse class="eye-pupil" cx="86" cy="66" rx="5" ry="8" fill="#111"/>
    <circle cx="90" cy="61" r="2.5" fill="white" opacity="0.9"/>
    <path d="M74,62 Q86,53 98,62" stroke="#c4722a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- NOSE — absolute -->
    <polygon points="68,80 64,76 72,76" fill="#e04070"/>
    <ellipse cx="68" cy="77" rx="1.5" ry="1" fill="white" opacity="0.6"/>

    <!-- SCREAMING MOUTH — all drawn at absolute coords, group uses transform-box -->
    <g class="cat-mouth-group">
      <!-- mouth dark oval -->
      <ellipse cx="68" cy="94" rx="16" ry="13" fill="#1a0505"/>
      <!-- throat -->
      <ellipse cx="68" cy="95" rx="11" ry="7"  fill="#6b1020"/>
      <!-- tongue -->
      <ellipse cx="68" cy="99" rx="9"  ry="6"  fill="#e04060"/>
      <ellipse cx="68" cy="97" rx="5"  ry="3"  fill="#f06880" opacity="0.7"/>
      <!-- top teeth -->
      <rect x="55" y="82" width="5" height="6" rx="2" fill="white"/>
      <rect x="62" y="81" width="5" height="7" rx="2" fill="white"/>
      <rect x="69" y="82" width="5" height="6" rx="2" fill="white"/>
      <!-- top fangs -->
      <polygon points="52,83 55,83 53.5,90" fill="white"/>
      <polygon points="84,83 81,83 82.5,90" fill="white"/>
      <!-- bottom teeth -->
      <rect x="59" y="100" width="4" height="4" rx="1.5" fill="white"/>
      <rect x="68" y="100" width="4" height="4" rx="1.5" fill="white"/>
      <!-- mouth outline -->
      <ellipse cx="68" cy="94" rx="16" ry="13" stroke="#c4722a" stroke-width="1.5" fill="none"/>

<script>
// ── Audio helpers ──────────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
const VOLUME_LEVELS = [1, 1.5, 2];
let volumeIndex = 0;
let ctx = null;
let output = null;
function getCtx() {
  if (!ctx) {
    ctx = new AudioCtx();
    output = ctx.createGain();
    output.gain.value = VOLUME_LEVELS[volumeIndex];
    output.connect(ctx.destination);
  }
  if (ctx.state === 'suspended') ctx.resume();
  return ctx;
}
function getOutput() {
  getCtx();
  return output;
}
function makeGain(vol, decay, dest) {
  const g = getCtx().createGain();
  const now = getCtx().currentTime;
  g.gain.setValueAtTime(vol, now);
  g.gain.exponentialRampToValueAtTime(0.0001, now + decay);
  g.connect(dest || getOutput());
  return g;
}
function addOsc(freq, type, vol, decay, dest) {
  const c = getCtx(), now = c.currentTime;
  const osc = c.createOscillator();
  const g = c.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  g.gain.setValueAtTime(vol, now);
  g.gain.exponentialRampToValueAtTime(0.0001, now + decay);
  osc.connect(g); g.connect(dest || getOutput());
  osc.start(now); osc.stop(now + decay);
  return osc;
}
function noiseClick(vol, dest) {
  const c = getCtx(), now = c.currentTime;
  const sz = c.sampleRate * 0.04;
  const buf = c.createBuffer(1, sz, c.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < sz; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(sz*0.08));
  const src = c.createBufferSource(); src.buffer = buf;
  const g = c.createGain(); g.gain.value = vol;
  src.connect(g); g.connect(dest || getOutput());
  src.start(now);
}

function playPartials(options) {
  const c = getCtx();
  const start = c.currentTime + (options.delay || 0);
  const master = c.createGain();
  const duration = options.duration || 0.75;
  const attack = options.attack || 0.004;

  master.gain.setValueAtTime(0.0001, start);
  master.gain.exponentialRampToValueAtTime(options.volume || 0.45, start + attack);
  master.gain.exponentialRampToValueAtTime(0.0001, start + duration);
  master.connect(getOutput());

  options.partials.forEach(partial => {
    const oscillator = c.createOscillator();
    const gain = c.createGain();
    const frequency = partial[0];
    const level = partial[1];
    const partialDuration = partial[2] || duration;

    oscillator.type = partial[3] || options.type || 'sine';
    oscillator.frequency.setValueAtTime(frequency, start);
    if (options.pitchDrop) {
      oscillator.frequency.exponentialRampToValueAtTime(
        frequency * options.pitchDrop,
        start + Math.min(partialDuration, duration)
      );
    }
    gain.gain.setValueAtTime(level, start);
    gain.gain.exponentialRampToValueAtTime(
      0.0001,
      start + Math.min(partialDuration, duration)
    );
    oscillator.connect(gain);
    gain.connect(master);
    oscillator.start(start);
    oscillator.stop(start + Math.min(partialDuration, duration) + 0.03);
  });

  if (options.strike) {
    const strikeSize = Math.floor(c.sampleRate * 0.018);
    const strikeBuffer = c.createBuffer(1, strikeSize, c.sampleRate);
    const strikeData = strikeBuffer.getChannelData(0);
    const strikeSource = c.createBufferSource();
    const strikeGain = c.createGain();
    const highpass = c.createBiquadFilter();

    for (let i = 0; i < strikeSize; i++) {
      strikeData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (strikeSize * 0.12));
    }
    highpass.type = 'highpass';
    highpass.frequency.value = options.strikeFrequency || 1400;
    strikeGain.gain.value = options.strike;
    strikeSource.buffer = strikeBuffer;
    strikeSource.connect(highpass);
    highpass.connect(strikeGain);
    strikeGain.connect(master);
    strikeSource.start(start);
  }
}

function playSweep(options) {
  const c = getCtx();
  const start = c.currentTime + (options.delay || 0);
  const oscillator = c.createOscillator();
  const gain = c.createGain();
  const duration = options.duration || 1;

  oscillator.type = options.type || 'sine';
  oscillator.frequency.setValueAtTime(options.from, start);
  oscillator.frequency.exponentialRampToValueAtTime(options.to, start + duration);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.exponentialRampToValueAtTime(options.volume || 0.25, start + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
  oscillator.connect(gain);
  gain.connect(getOutput());
  oscillator.start(start);
  oscillator.stop(start + duration + 0.03);
}

const recordingPlayers = new Map();

function getRecording(src) {
  if (!recordingPlayers.has(src)) {
    const audio = new Audio(src);
    audio.preload = 'auto';
    recordingPlayers.set(src, { audio });
  }
  return recordingPlayers.get(src);
}

function configureAudioSession() {
  if (!navigator.audioSession || navigator.audioSession.type === 'playback') return;
  try {
    navigator.audioSession.type = 'playback';
  } catch (error) {
    console.warn('Не удалось настроить аудиосессию:', error);
  }
}

function playRecording(src) {
  const recording = getRecording(src);
  configureAudioSession();
  recording.audio.pause();
  recording.audio.currentTime = 0;
  recording.audio.play().catch(error => console.warn('Не удалось воспроизвести запись:', error));
}

  void catContainer.offsetWidth;
  catContainer.classList.add('scream');
  if (catTimeout) clearTimeout(catTimeout);
  catTimeout = setTimeout(() => catContainer.classList.remove('scream'), 2300);
}

function triggerPerson(images) {
  catContainer.classList.remove('scream');
  egorImage.src = images[Math.floor(Math.random() * images.length)];
  const tilt = -4 + Math.random() * 8;
  egorContainer.style.setProperty('--egor-tilt', `${tilt}deg`);
  egorContainer.style.setProperty('--egor-tilt-reverse', `${tilt * -0.6}deg`);
  egorContainer.style.setProperty('--egor-flip', Math.random() < 0.5 ? '-1' : '1');
  egorContainer.classList.remove('pop');
  void egorContainer.offsetWidth;
  egorContainer.classList.add('pop');
  if (egorTimeout) clearTimeout(egorTimeout);
  egorTimeout = setTimeout(() => egorContainer.classList.remove('pop'), 2300);
}

Object.values(PERSON_IMAGES).forEach(images => {
  images.forEach(src => {
    const image = new Image();
    image.src = src;
  });
});


let currentId = 'bell';
let panelOpen = false;
let labelTimeout = null;
let screenRingEnabled = false;

const bellBtn = document.getElementById('bellBtn');
const labelEl = document.getElementById('label');
const rings = [document.getElementById('ring1'),document.getElementById('ring2'),document.getElementById('ring3')];
const cursorEl = document.getElementById('cursor');
const glowBg = document.getElementById('glowBg');
const settingsBtn = document.getElementById('settingsBtn');
const settingsPanel = document.getElementById('settingsPanel');
const soundListEl = document.getElementById('soundList');
const catalogLink = document.getElementById('catalogLink');
const volumeToggle = document.getElementById('volumeToggle');
const volumeValue = document.getElementById('volumeValue');
const screenRingToggle = document.getElementById('screenRingToggle');
const screenRingValue = document.getElementById('screenRingValue');

function cycleVolume() {
  volumeIndex = (volumeIndex + 1) % VOLUME_LEVELS.length;
  const volume = VOLUME_LEVELS[volumeIndex];
  const volumeLabel = `×${volume.toFixed(1)}`;

  if (output) {
    output.gain.setTargetAtTime(volume, ctx.currentTime, 0.01);
  }
  volumeValue.textContent = volumeLabel;
  volumeToggle.setAttribute('aria-label', `Громкость: ${volumeLabel}. Нажмите, чтобы изменить`);
}

volumeToggle.addEventListener('click', cycleVolume);

function toggleScreenRing() {
  screenRingEnabled = !screenRingEnabled;
  screenRingToggle.setAttribute('aria-pressed', String(screenRingEnabled));
  screenRingToggle.setAttribute(
    'aria-label',
    `Звонок по всему экрану: ${screenRingEnabled ? 'включен' : 'выключен'}`
  );
  screenRingValue.textContent = screenRingEnabled ? 'Вкл.' : 'Выкл.';
}

screenRingToggle.addEventListener('click', toggleScreenRing);

// ── Build list ─────────────────────────────────────────────────────────────
SOUNDS.forEach(s => {
  const item = document.createElement('div');
  item.className = 'sound-item' + (s.id === currentId ? ' active' : '');
  item.dataset.id = s.id;
  item.innerHTML = `
    <div class="sound-dot"></div>
    <div class="sound-info">
      <div class="sound-name">${s.name}</div>
      <div class="sound-tag">${s.tag}</div>
    </div>
    <button class="preview-btn" aria-label="Прослушать: ${s.name}">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
    </button>`;
  soundListEl.appendChild(item);

  item.addEventListener('click', e => {
    if (e.target.closest('.preview-btn')) return;
    selectSound(s.id);
    closePanel();
  });
  item.querySelector('.preview-btn').addEventListener('click', e => {
    e.stopPropagation();
    s.play();
  });
});

function selectSound(id) {
  currentId = id;
  document.querySelectorAll('.sound-item').forEach(el =>
    el.classList.toggle('active', el.dataset.id === id));
  const s = SOUNDS.find(x => x.id === id);
  if (s) labelEl.textContent = s.label;
}

// ── Panel ──────────────────────────────────────────────────────────────────
function openPanel() {
  panelOpen = true;
  settingsPanel.classList.add('open');
  settingsBtn.classList.add('spinning');
  setTimeout(() => settingsBtn.classList.remove('spinning'), 450);
}
function closePanel() {
  panelOpen = false;
  settingsPanel.classList.remove('open');
}

settingsBtn.addEventListener('click', () => panelOpen ? closePanel() : openPanel());

document.addEventListener('click', e => {
  if (panelOpen && !settingsPanel.contains(e.target) && e.target !== settingsBtn && !settingsBtn.contains(e.target))
    closePanel();
});

document.addEventListener('click', e => {
  if (!screenRingEnabled) return;
  if (e.target.closest('#bellBtn, #settingsBtn, #settingsPanel, #catalogLink')) return;
  ring();
});

// ── Ring ───────────────────────────────────────────────────────────────────
function ring() {
  if (panelOpen) { closePanel(); return; }
  const sound = SOUNDS.find(s => s.id === currentId) || SOUNDS[0];
  sound.play();

  bellBtn.classList.remove('ringing');
  void bellBtn.offsetWidth;
  bellBtn.classList.add('ringing');

  labelEl.textContent = sound.label;
  labelEl.style.animation = 'none';
  void labelEl.offsetWidth;
  labelEl.style.animation = '';
  labelEl.classList.remove('show');
  void labelEl.offsetWidth;
  labelEl.classList.add('show');

  rings.forEach((r,i) => {
    r.style.animation = 'none';
    setTimeout(() => { r.style.animation = `rippleOut 1.2s ease-out ${i*0.18}s forwards`; }, 10);
  });

  glowBg.style.opacity = '3';
  setTimeout(() => glowBg.style.opacity = '1', 300);

  const personImages = PERSON_IMAGES[sound.id];
  if (personImages) {
    triggerPerson(personImages);
  } else {
    triggerCat();
  }

  if (labelTimeout) clearTimeout(labelTimeout);
  labelTimeout = setTimeout(() => labelEl.classList.remove('show'), 1500);
}

bellBtn.addEventListener('click', ring);
bellBtn.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') ring(); });
bellBtn.addEventListener('touchstart', e => { e.preventDefault(); ring(); }, { passive: false });

// ── Cursor ─────────────────────────────────────────────────────────────────
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
});
bellBtn.addEventListener('mouseenter', () => cursorEl.classList.add('big'));
bellBtn.addEventListener('mouseleave', () => cursorEl.classList.remove('big'));
catalogLink.addEventListener('mouseenter', () => cursorEl.classList.add('big'));
catalogLink.addEventListener('mouseleave', () => cursorEl.classList.remove('big'));
</script>
</body>
</html>
